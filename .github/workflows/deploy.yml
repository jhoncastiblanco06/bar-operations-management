name: Deploy con Cloudflare Tunnel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh

          # Decodificar la clave desde base64
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          cat > ~/.ssh/config << EOF
          Host server
            HostName ssh.fljgroup.site
            User kasay
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

      - name: Ejecutar deploy
        run: |
          ssh server << 'EOF'
            # 1. Entrar al directorio de trabajo
            cd ${{ secrets.WORK_DIR }}
            
            # 2. Descargar el código más reciente
            git pull origin main
            
            # 3. Construir y levantar los 3 contenedores (Frontend, Backend y BD)
            docker compose up -d --build
            
            # 🚀 4. BLINDAJE DE BASE DE DATOS: 
            # Le damos 10 segundos a PostgreSQL (database_bar) para que termine de arrancar correctamente
            echo "Esperando a que la base de datos esté lista..."
            sleep 10
            
            # Entramos al contenedor del backend y forzamos la actualización del esquema de Prisma
            echo "Sincronizando la Base de Datos con Prisma..."
            docker exec backend_bar npx prisma generate
            docker exec backend_bar npx prisma db push
            
            # 5. Limpieza para no saturar el disco del servidor
            docker image prune -f
            
            echo "✅ ¡Despliegue 100% funcional y base de datos actualizada!"
          EOF
