name: Deploy con Cloudflare Tunnel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Instalar cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh

          # Decodificar la clave desde base64
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519

          chmod 600 ~/.ssh/id_ed25519

          cat > ~/.ssh/config << EOF
          Host server
            HostName ssh.fljgroup.site
            User kasay
            IdentityFile ~/.ssh/id_ed25519
            ProxyCommand cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

      - name: Ejecutar deploy
        run: |
          ssh server << 'EOF'
            # 1. Entrar al directorio de trabajo
            cd ${{ secrets.WORK_DIR }}

            # 2. Forzar la descarga exacta desde GitHub (Ignorando conflictos locales)
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            
            # 3. Construir y levantar los contenedores
            docker compose up -d --build
            
            # 4. Esperar a PostgreSQL
            echo "Esperando a que la base de datos esté lista..."
            sleep 10
            
            # 🚀 5. BLINDAJE DE PRODUCCIÓN
            echo "Generando cliente de Prisma..."
            docker exec backend_bar npx prisma generate
            
            echo "Sincronizando Base de Datos de forma segura..."
            docker exec backend_bar npx prisma db push
            
            # 6. Limpieza
            docker image prune -f
            
            echo "✅ ¡Despliegue 100% funcional y base de datos actualizada con seguridad!"
          EOF
